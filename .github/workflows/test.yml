name: Tests

on:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - "**"
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      test_stage:
        description: "Manual local test stage"
        required: false
        type: choice
        default: full
        options:
          - focus
          - quick
          - full
          - all
          - architecture
          - docs
          - slow
          - e2e
      run_postgres:
        description: "Run PostgreSQL integration tests"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  local-tests:
    name: Local pytest gate
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --frozen --extra dev --extra server

      - name: Run staged pytest
        id: pytest
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          REQUESTED_STAGE: ${{ github.event.inputs.test_stage }}
        run: |
          $stage = "full"
          if ($env:EVENT_NAME -eq "workflow_dispatch") {
            if ($env:REQUESTED_STAGE) {
              $stage = $env:REQUESTED_STAGE
            }
          } elseif ($env:EVENT_NAME -eq "pull_request") {
            $stage = "quick"
          }

          $allowedStages = @("focus", "quick", "full", "all", "architecture", "docs", "slow", "e2e")
          if ($stage -notin $allowedStages) {
            Write-Error "Unsupported test stage: $stage"
            exit 2
          }

          New-Item -ItemType Directory -Force reports | Out-Null
          "stage=$stage" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

          # Security: workflow_dispatch input is passed through env and whitelisted above.
          .\scripts\test.ps1 $stage --junitxml "reports/pytest-$stage.xml"

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-local-${{ steps.pytest.outputs.stage || 'not-started' }}
          path: reports/
          if-no-files-found: ignore
          retention-days: 14

  postgres-tests:
    name: PostgreSQL pytest gate
    runs-on: windows-latest
    timeout-minutes: 30
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_postgres == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --frozen --extra dev --extra server

      - name: Set up PostgreSQL
        id: postgres
        uses: ikalnytskyi/action-setup-postgres@v8
        with:
          username: rider
          password: rider
          database: rider_test
          port: 5432
          postgres-version: "16"

      - name: Run PostgreSQL tests
        env:
          DATABASE_URL: postgresql+asyncpg://rider:rider@localhost:5432/rider_test
          TEST_DATABASE_URL: postgresql+asyncpg://rider:rider@localhost:5432/rider_test
        run: |
          New-Item -ItemType Directory -Force reports | Out-Null
          .\scripts\test.ps1 postgres --junitxml reports/pytest-postgres.xml

      - name: Upload PostgreSQL pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-postgres
          path: reports/
          if-no-files-found: ignore
          retention-days: 14

  deployment-config:
    name: Deployment config gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        env:
          RIDER_POSTGRES_PASSWORD: rider
          RIDER_DB_MIGRATION_BACKUP_CONFIRMED: "1"
          RIDER_TELEGRAM_WEBHOOK_SECRET: ci_dummy_webhook_secret
          RIDER_TELEGRAM_BOT_TOKEN: ci_dummy_bot_token
        run: docker compose -f deploy/docker-compose.yml config

      - name: Build server Docker image
        run: docker build -f deploy/Dockerfile.server -t rider-server:ci .

      # Task 8-C: backend /health smoke. 무거운 DB/migration 없이 컨테이너를 띄워
      # liveness probe(/health 는 dependency-free)를 실제로 친다. fast PR 경로는 건너뛰고
      # push/schedule/manual 에서만 실행한다.
      - name: Backend /health smoke
        if: github.event_name != 'pull_request'
        env:
          # /health 는 DB 에 접속하지 않지만 production create_app 은 DATABASE_URL 존재를
          # 요구한다(test_production_app_requires_database_url). 더미 URL 로 부팅만 시킨다.
          DUMMY_DATABASE_URL: postgresql+asyncpg://rider:rider@127.0.0.1:5432/rider
        run: |
          docker run -d --name rider-health-smoke \
            -e APP_ENV=production \
            -e DATABASE_URL="$DUMMY_DATABASE_URL" \
            -p 8000:8000 rider-server:ci
          ok=""
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health | grep -q '"status":"ok"'; then
              ok="yes"
              echo "health ok after ${i}s"
              break
            fi
            sleep 1
          done
          docker logs rider-health-smoke || true
          docker rm -f rider-health-smoke || true
          if [ -z "$ok" ]; then
            echo "::error::backend /health did not become healthy"
            exit 1
          fi

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [local-tests, postgres-tests, deployment-config]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "::error::DEPLOY_HOST and DEPLOY_SSH_KEY secrets are required"
            exit 1
          fi
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/rider_deploy_key
          chmod 600 ~/.ssh/rider_deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          if [ -z "$DEPLOY_USER" ]; then
            echo "::error::DEPLOY_USER secret is required"
            exit 1
          fi
          ssh -i ~/.ssh/rider_deploy_key "$DEPLOY_USER@$DEPLOY_HOST" 'bash -se' <<'REMOTE'
          set -euo pipefail
          cd /opt/rider-server/repo
          git fetch origin main
          git checkout -B main -f origin/main
          set -a
          . ./.env
          set +a
          docker compose -p rider -f deploy/docker-compose.yml up --build -d --remove-orphans
          docker compose -p rider -f deploy/docker-compose.yml ps
          curl -fsS http://127.0.0.1:8000/health
          REMOTE

  ci-summary:
    name: CI summary
    runs-on: windows-latest
    needs: [local-tests, postgres-tests, deployment-config, deploy-production]
    if: always()

    steps:
      - name: Write summary
        shell: pwsh
        run: |
          @"
          ## Test CI Summary

          - Local pytest gate: ${{ needs.local-tests.result }}
          - PostgreSQL pytest gate: ${{ needs.postgres-tests.result }}
          - Deployment config gate: ${{ needs.deployment-config.result }}
          - Production deploy: ${{ needs.deploy-production.result }}

          PRs automatically run the quick local gate, PostgreSQL integration tests, and deployment config gate.
          Pushes, schedules, and manual default runs use the full local gate plus PostgreSQL and deployment config gates.
          Pushes to main deploy to the EC2 production compose stack after all gates pass.
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Notify Slack
        if: always()
        shell: pwsh
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title || github.event_name }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name || github.event.pull_request.user.login || github.actor }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          LOCAL_RESULT: ${{ needs.local-tests.result }}
          POSTGRES_RESULT: ${{ needs.postgres-tests.result }}
          DEPLOYMENT_RESULT: ${{ needs.deployment-config.result }}
          PRODUCTION_DEPLOY_RESULT: ${{ needs.deploy-production.result }}
        run: |
          if (-not $env:SLACK_WEBHOOK_URL) {
            Write-Warning "SLACK_WEBHOOK_URL secret is not configured; skipping Slack notification."
            exit 0
          }

          $localPassed = $env:LOCAL_RESULT -eq "success"
          $postgresPassed = $env:POSTGRES_RESULT -in @("success", "skipped")
          $deploymentPassed = $env:DEPLOYMENT_RESULT -eq "success"
          $deployPassed = $env:PRODUCTION_DEPLOY_RESULT -in @("success", "skipped")
          $passed = $localPassed -and $postgresPassed -and $deploymentPassed -and $deployPassed
          $icon = if ($passed) { "✅" } else { "❌" }
          $statusText = if ($passed) { "CI passed" } else { "CI failed" }
          $commitShort = $env:COMMIT_SHA.Substring(0, [Math]::Min(7, $env:COMMIT_SHA.Length))
          $commitMessage = ($env:COMMIT_MESSAGE -split "`r?`n")[0]
          $color = if ($passed) { "good" } else { "danger" }

          $payload = @{
            text = "$icon $statusText - $($env:REPOSITORY)@$($env:BRANCH_NAME)"
            attachments = @(
              @{
                color = $color
                blocks = @(
                  @{
                    type = "section"
                    text = @{
                      type = "mrkdwn"
                      text = "$icon *$statusText*"
                    }
                  },
                  @{
                    type = "section"
                    fields = @(
                      @{
                        type = "mrkdwn"
                        text = "*Repository*`n$($env:REPOSITORY)"
                      },
                      @{
                        type = "mrkdwn"
                        text = "*Branch*`n$($env:BRANCH_NAME)"
                      },
                      @{
                        type = "mrkdwn"
                        text = "*Commit*`n<$($env:RUN_URL)|$commitShort> $commitMessage"
                      },
                      @{
                        type = "mrkdwn"
                        text = "*Author*`n$($env:COMMIT_AUTHOR)"
                      },
                      @{
                        type = "mrkdwn"
                        text = "*Local tests*`n$($env:LOCAL_RESULT)"
                      },
                      @{
                        type = "mrkdwn"
                        text = "*PostgreSQL tests*`n$($env:POSTGRES_RESULT)"
                      },
                      @{
                        type = "mrkdwn"
                        text = "*Deployment config*`n$($env:DEPLOYMENT_RESULT)"
                      },
                      @{
                        type = "mrkdwn"
                        text = "*Production deploy*`n$($env:PRODUCTION_DEPLOY_RESULT)"
                      }
                    )
                  }
                )
              }
            )
          } | ConvertTo-Json -Depth 10 -Compress

          Invoke-RestMethod -Uri $env:SLACK_WEBHOOK_URL -Method Post -ContentType "application/json" -Body $payload
