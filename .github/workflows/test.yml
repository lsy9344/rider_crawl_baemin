name: Tests

on:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - "**"
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      test_stage:
        description: "Manual local test stage"
        required: false
        type: choice
        default: full
        options:
          - focus
          - quick
          - full
          - all
          - architecture
          - docs
          - slow
          - e2e
      run_postgres:
        description: "Run PostgreSQL integration tests"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PYTHON_VERSION: "3.11"

jobs:
  changes:
    name: Change filter
    runs-on: ubuntu-latest
    outputs:
      postgres: ${{ steps.filter.outputs.postgres }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Detect PostgreSQL-sensitive changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            postgres:
              - ".github/workflows/test.yml"
              - "migrations/**"
              - "alembic.ini"
              - "src/rider_server/db/**"
              - "src/rider_server/queue/postgres_queue.py"
              - "src/rider_server/**/*postgres*.py"
              - "src/rider_server/**/*_postgres.py"
              - "tests/negative/**"
              - "tests/server/test_db_schema.py"
              - "tests/server/test_migration.py"
              - "tests/server/test_postgres_runtime_guards.py"
              - "tests/server/test_queue_backend.py"

  local-tests:
    name: Local pytest gate
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --frozen --extra dev --extra server

      - name: Run staged pytest
        id: pytest
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          REQUESTED_STAGE: ${{ github.event.inputs.test_stage }}
        run: |
          $stage = "full"
          if ($env:EVENT_NAME -eq "workflow_dispatch") {
            if ($env:REQUESTED_STAGE) {
              $stage = $env:REQUESTED_STAGE
            }
          } elseif ($env:EVENT_NAME -eq "pull_request") {
            $stage = "quick"
          }

          $allowedStages = @("focus", "quick", "full", "all", "architecture", "docs", "slow", "e2e")
          if ($stage -notin $allowedStages) {
            Write-Error "Unsupported test stage: $stage"
            exit 2
          }

          New-Item -ItemType Directory -Force reports | Out-Null
          "stage=$stage" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

          # Security: workflow_dispatch input is passed through env and whitelisted above.
          .\scripts\test.ps1 $stage --junitxml "reports/pytest-$stage.xml"

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-local-${{ steps.pytest.outputs.stage || 'not-started' }}
          path: reports/
          if-no-files-found: ignore
          retention-days: 14

  postgres-tests:
    name: PostgreSQL pytest gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: changes
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && github.event.inputs.run_postgres == 'true') ||
        (github.event_name == 'pull_request' && needs.changes.outputs.postgres == 'true') ||
        (github.event_name != 'workflow_dispatch' && github.event_name != 'pull_request')
      }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rider
          POSTGRES_PASSWORD: rider
          POSTGRES_DB: rider_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rider -d rider_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --frozen --extra dev --extra server

      - name: Run PostgreSQL tests
        shell: pwsh
        env:
          DATABASE_URL: postgresql+asyncpg://rider:rider@localhost:5432/rider_test
          TEST_DATABASE_URL: postgresql+asyncpg://rider:rider@localhost:5432/rider_test
        run: |
          New-Item -ItemType Directory -Force reports | Out-Null
          ./scripts/test.ps1 postgres --junitxml reports/pytest-postgres.xml

      - name: Upload PostgreSQL pytest report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-postgres
          path: reports/
          if-no-files-found: ignore
          retention-days: 14

  deployment-config:
    name: Deployment config gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate Docker Compose config
        env:
          RIDER_POSTGRES_PASSWORD: rider
          RIDER_DB_MIGRATION_BACKUP_CONFIRMED: "1"
          RIDER_TELEGRAM_WEBHOOK_SECRET: ci_dummy_webhook_secret
          RIDER_TELEGRAM_BOT_TOKEN: ci_dummy_bot_token
        run: docker compose -f deploy/docker-compose.yml config

      - name: Validate memory-hardening DB budget
        env:
          PYTHONPATH: src
          RIDER_DB_RESERVED_CONNECTIONS: "10"
        run: RIDER_UVICORN_WORKERS=1 RIDER_DB_POOL_SIZE=2 RIDER_DB_MAX_OVERFLOW=2 python scripts/check_db_connection_budget.py --postgres-max-connections 100

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Validate Terraform config
        run: |
          terraform -chdir=deploy/terraform init -backend=false
          terraform -chdir=deploy/terraform fmt -check
          terraform -chdir=deploy/terraform validate

      - name: Pre-pull BuildKit image
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if docker pull moby/buildkit:buildx-stable-1; then
              exit 0
            fi
            if [ "$attempt" -lt 5 ]; then
              sleep $((attempt * 10))
            fi
          done
          exit 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: image=moby/buildkit:buildx-stable-1

      - name: Build server Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/Dockerfile.server
          tags: rider-server:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Task 8-C: backend /health smoke. 무거운 DB/migration 없이 컨테이너를 띄워
      # liveness probe(/health 는 dependency-free)를 실제로 친다. fast PR 경로는 건너뛰고
      # push/schedule/manual 에서만 실행한다.
      - name: Backend /health smoke
        if: github.event_name != 'pull_request'
        env:
          # /health 는 DB 에 접속하지 않지만 production create_app 은 DATABASE_URL 존재를
          # 요구한다(test_production_app_requires_database_url). 더미 URL 로 부팅만 시킨다.
          DUMMY_DATABASE_URL: postgresql+asyncpg://rider:rider@127.0.0.1:5432/rider
        run: |
          docker run -d --name rider-health-smoke \
            -e APP_ENV=production \
            -e DATABASE_URL="$DUMMY_DATABASE_URL" \
            -p 8000:8000 rider-server:ci
          ok=""
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health | grep -q '"status":"ok"'; then
              ok="yes"
              echo "health ok after ${i}s"
              break
            fi
            sleep 1
          done
          docker logs rider-health-smoke || true
          docker rm -f rider-health-smoke || true
          if [ -z "$ok" ]; then
            echo "::error::backend /health did not become healthy"
            exit 1
          fi

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [local-tests, postgres-tests, deployment-config]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: production-deploy-main
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ap-northeast-2
      ECR_REPOSITORY: rider-server
      DEPLOY_AWS_ROLE_ARN: ${{ secrets.DEPLOY_AWS_ROLE_ARN }}
      DEPLOY_EC2_INSTANCE_ID: ${{ secrets.DEPLOY_EC2_INSTANCE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.DEPLOY_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set production image URI
        id: image
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.ecr-login.outputs.registry }}/${ECR_REPOSITORY}:${GITHUB_SHA}"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push production image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/Dockerfile.server
          platforms: linux/arm64
          tags: ${{ steps.image.outputs.image }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy production through SSM
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          RIDER_SERVER_IMAGE: ${{ steps.image.outputs.image }}
          DEPLOY_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$DEPLOY_AWS_ROLE_ARN" ] || [ -z "$DEPLOY_EC2_INSTANCE_ID" ]; then
            echo "::error::DEPLOY_AWS_ROLE_ARN and DEPLOY_EC2_INSTANCE_ID secrets must be configured"
            exit 1
          fi

          remote_command="$(cat <<'REMOTE'
          bash <<'BASH'
          set -euo pipefail
          export HOME=/root
          export AWS_REGION="__AWS_REGION__"
          export AWS_DEFAULT_REGION="__AWS_REGION__"
          git config --global --add safe.directory /opt/rider-server/repo
          cd /opt/rider-server/repo
          git fetch origin main
          git checkout -B main -f FETCH_HEAD
          bash scripts/production_deploy_preflight.sh
          for i in $(seq 1 60); do
            if docker info >/dev/null 2>&1; then
              echo "docker daemon ready after ${i}s"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::docker daemon did not become ready"
              exit 1
            fi
            sleep 2
          done
          aws ecr get-login-password --region "__AWS_REGION__" | docker login --username AWS --password-stdin "__ECR_REGISTRY__"
          export RIDER_SERVER_IMAGE="__RIDER_SERVER_IMAGE__"
          docker compose --env-file .env -p rider -f deploy/docker-compose.yml -f deploy/docker-compose.dev-public-admin.yml pull migrate backend-api scheduler queue-recovery telegram-dispatch
          docker compose --env-file .env -p rider -f deploy/docker-compose.yml -f deploy/docker-compose.dev-public-admin.yml up -d --no-build --remove-orphans
          docker compose --env-file .env -p rider -f deploy/docker-compose.yml -f deploy/docker-compose.dev-public-admin.yml ps
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/health; then
              echo "production health ok after ${i}s"
              exit 0
            fi
            sleep 2
          done
          docker compose --env-file .env -p rider -f deploy/docker-compose.yml -f deploy/docker-compose.dev-public-admin.yml ps
          docker compose --env-file .env -p rider -f deploy/docker-compose.yml -f deploy/docker-compose.dev-public-admin.yml logs --tail=80 backend-api
          exit 1
          BASH
          REMOTE
          )"
          remote_command="${remote_command//__AWS_REGION__/$AWS_REGION}"
          remote_command="${remote_command//__ECR_REGISTRY__/$ECR_REGISTRY}"
          remote_command="${remote_command//__RIDER_SERVER_IMAGE__/$RIDER_SERVER_IMAGE}"

          jq -n --arg cmd "$remote_command" '{commands: [$cmd]}' > ssm-parameters.json
          command_id="$(
            aws ssm send-command \
              --instance-ids "$DEPLOY_EC2_INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters file://ssm-parameters.json \
              --comment "Deploy rider-server ${DEPLOY_SHA}" \
              --query "Command.CommandId" \
              --output text
          )"
          echo "SSM command id: $command_id"
          set +e
          aws ssm wait command-executed --command-id "$command_id" --instance-id "$DEPLOY_EC2_INSTANCE_ID"
          wait_rc=$?
          set -e
          aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "$DEPLOY_EC2_INSTANCE_ID" \
            --query '{Status:Status,ResponseCode:ResponseCode,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
            --output json
          if [ "$wait_rc" -ne 0 ]; then
            exit "$wait_rc"
          fi

  ci-summary:
    name: CI summary
    runs-on: windows-latest
    needs: [local-tests, postgres-tests, deployment-config, deploy-production]
    if: always()

    steps:
      - name: Write summary
        shell: pwsh
        run: |
          @"
          ## Test CI Summary

          - Local pytest gate: ${{ needs.local-tests.result }}
          - PostgreSQL pytest gate: ${{ needs.postgres-tests.result }}
          - Deployment config gate: ${{ needs.deployment-config.result }}
          - Production deploy: ${{ needs.deploy-production.result }}

          PRs automatically run the quick local gate and deployment config gate. PostgreSQL integration tests run on PRs only when DB-sensitive files change.
          Pushes, schedules, and manual default runs use the full local gate plus PostgreSQL and deployment config gates.
          Pushes to main deploy to the EC2 production compose stack after all gates pass.
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Notify Slack
        if: ${{ always() && !cancelled() }}
        shell: pwsh
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title || github.event_name }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name || github.event.pull_request.user.login || github.actor }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          LOCAL_RESULT: ${{ needs.local-tests.result }}
          POSTGRES_RESULT: ${{ needs.postgres-tests.result }}
          DEPLOYMENT_RESULT: ${{ needs.deployment-config.result }}
          PRODUCTION_DEPLOY_RESULT: ${{ needs.deploy-production.result }}
        run: |
          if (-not $env:SLACK_WEBHOOK_URL) {
            Write-Warning "SLACK_WEBHOOK_URL secret is not configured; skipping Slack notification."
            exit 0
          }

          $localPassed = $env:LOCAL_RESULT -eq "success"
          $postgresPassed = $env:POSTGRES_RESULT -in @("success", "skipped")
          $deploymentPassed = $env:DEPLOYMENT_RESULT -eq "success"
          $deployPassed = $env:PRODUCTION_DEPLOY_RESULT -in @("success", "skipped")
          $passed = $localPassed -and $postgresPassed -and $deploymentPassed -and $deployPassed
          $icon = if ($passed) { "✅" } else { "❌" }
          $statusText = if ($passed) { "CI passed" } else { "CI failed" }
          $commitShort = $env:COMMIT_SHA.Substring(0, [Math]::Min(7, $env:COMMIT_SHA.Length))
          $commitMessage = ($env:COMMIT_MESSAGE -split "`r?`n")[0]
          $color = if ($passed) { "good" } else { "danger" }

          $payload = @{
            text = "$icon $statusText - $($env:REPOSITORY)@$($env:BRANCH_NAME)"
            attachments = @(
              @{
                color = $color
                blocks = @(
                  @{
                    type = "section"
                    text = @{
                      type = "mrkdwn"
                      text = "$icon *$statusText*"
                    }
                  },
                  @{
                    type = "section"
                    fields = @(
                      @{
                        type = "mrkdwn"
                        text = "*Repository*`n$($env:REPOSITORY)"
                      },
                      @{
                        type = "mrkdwn"
                        text = "*Branch*`n$($env:BRANCH_NAME)"
                      },
                      @{
                        type = "mrkdwn"
                        text = "*Commit*`n<$($env:RUN_URL)|$commitShort> $commitMessage"
                      },
                      @{
                        type = "mrkdwn"
                        text = "*Author*`n$($env:COMMIT_AUTHOR)"
                      },
                      @{
                        type = "mrkdwn"
                        text = "*Local tests*`n$($env:LOCAL_RESULT)"
                      },
                      @{
                        type = "mrkdwn"
                        text = "*PostgreSQL tests*`n$($env:POSTGRES_RESULT)"
                      },
                      @{
                        type = "mrkdwn"
                        text = "*Deployment config*`n$($env:DEPLOYMENT_RESULT)"
                      },
                      @{
                        type = "mrkdwn"
                        text = "*Production deploy*`n$($env:PRODUCTION_DEPLOY_RESULT)"
                      }
                    )
                  }
                )
              }
            )
          } | ConvertTo-Json -Depth 10 -Compress

          Invoke-RestMethod -Uri $env:SLACK_WEBHOOK_URL -Method Post -ContentType "application/json" -Body $payload
