{# Story 5.11 엔티티 목록 partial(조회) — 30초 polling 대상. autoescape 유지(운영 식별자 노출 최소). #}
<table>
  <caption class="muted">{{ title }} 목록 ({{ rows | length }}건)</caption>
  <thead>
    <tr><th>id</th><th>요약</th><th>상태</th></tr>
  </thead>
  <tbody>
    {% for row in rows %}
    <tr>
      <td><code>{{ row.id }}</code></td>
      <td>{{ row.summary }}</td>
      <td>{{ row.state }}</td>
    </tr>
    {% else %}
    <tr><td colspan="3" class="muted">항목이 없습니다.</td></tr>
    {% endfor %}
  </tbody>
</table>
