{# Story 5.11 엔티티 목록 partial(조회): 30초 polling 대상. autoescape 유지(운영 식별자 노출 최소). #}
<div class="table-wrap">
<table>
  <caption class="muted">{{ title }} 목록 ({{ rows | length }}건)</caption>
  <thead>
    <tr><th>요약</th><th>상태</th>{% if show_debug_ids %}<th>id</th>{% endif %}</tr>
  </thead>
  <tbody>
    {% for row in rows %}
    <tr>
      <td>{{ row.summary }}</td>
      <td>{{ row.state }}</td>
      {% if show_debug_ids %}<td><code>{{ row.id }}</code></td>{% endif %}
    </tr>
    {% else %}
    <tr><td colspan="{{ 3 if show_debug_ids else 2 }}" class="muted">항목이 없습니다.</td></tr>
    {% endfor %}
  </tbody>
</table>
</div>
