# Alembic 설정 — Story 5.2 (Epic 5 DB 마이그레이션).
#
# sqlalchemy.url 은 여기에 평문으로 두지 않는다(NFR-8). migrations/env.py 가 env
# (DATABASE_URL) 또는 프로그램 주입(config sqlalchemy.url)에서 읽는다. CLI 실행 예:
#   DATABASE_URL=postgresql+asyncpg://user:pass@host/db PYTHONPATH=src alembic upgrade head

[alembic]
script_location = migrations
prepend_sys_path = src
# version 파일명 템플릿(리비전 슬러그). 버전 파일은 커밋 대상(.gitignore 제외 금지).
# sqlalchemy.url = (의도적 미설정 — env/프로그램 주입)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
