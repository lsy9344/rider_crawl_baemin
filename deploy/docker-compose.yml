# rider_server Cloud 백엔드 — Story 5.1 최소 compose (+ 5.5 Telegram webhook env).
#
# Story 5.5 결정(ADD-12): Telegram webhook(`POST /v1/telegram/webhook`)은 별도 dispatcher
# 프로세스가 아니라 backend-api FastAPI 앱의 인바운드 라우트로 서빙한다(send-only 중앙 정책 —
# getUpdates polling 경합 회피, AC가 outbound 디스패치 배선을 요구하지 않으므로 최소 범위). 따라서
# 기존 `telegram-dispatcher` placeholder 는 별도 서비스가 아니라 backend-api 의 webhook env 분리로
# 채운다. webhook secret/public URL 은 평문 금지 — `*_ref` 핸들·플레이스홀더만 deploy/env/ 에 둔다.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${RIDER_POSTGRES_DB:-rider}
      POSTGRES_USER: ${RIDER_POSTGRES_USER:-rider}
      POSTGRES_PASSWORD: ${RIDER_POSTGRES_PASSWORD:?set RIDER_POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    image: rider-server:dev
    command: python -m rider_server.db.migrate upgrade head
    env_file:
      - ./env/backend-api.env
    environment:
      DATABASE_URL: "postgresql+asyncpg://${RIDER_POSTGRES_USER:-rider}:${RIDER_POSTGRES_PASSWORD:?set RIDER_POSTGRES_PASSWORD}@db:5432/${RIDER_POSTGRES_DB:-rider}"
      RIDER_DB_MIGRATION_BACKUP_CONFIRMED: "${RIDER_DB_MIGRATION_BACKUP_CONFIRMED:?confirm current DB backup before running migrations}"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  backend-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    image: rider-server:dev
    command:
      - sh
      - -c
      - uvicorn rider_server.main:app --host 0.0.0.0 --port 8000 --workers $${RIDER_UVICORN_WORKERS:-1}
    ports:
      # Host port is configurable so review/staging stacks can run beside an existing local stack.
      - "${RIDER_BACKEND_BIND:-127.0.0.1}:${RIDER_BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    env_file:
      - ./env/backend-api.env
      # Story 5.5 — Telegram webhook secret/public URL 분리 env(평문 secret 없음, *_ref 만).
      - ./env/telegram-webhook.env
    environment:
      DATABASE_URL: "postgresql+asyncpg://${RIDER_POSTGRES_USER:-rider}:${RIDER_POSTGRES_PASSWORD:?set RIDER_POSTGRES_PASSWORD}@db:5432/${RIDER_POSTGRES_DB:-rider}"
      RIDER_DB_POOL_SIZE: ${RIDER_DB_POOL_SIZE:-5}
      RIDER_DB_MAX_OVERFLOW: ${RIDER_DB_MAX_OVERFLOW:-10}
      RIDER_UVICORN_WORKERS: ${RIDER_UVICORN_WORKERS:-1}
      RIDER_JOB_LEASE_SECONDS: ${RIDER_JOB_LEASE_SECONDS:-120}
      RIDER_TELEGRAM_WEBHOOK_SECRET: ${RIDER_TELEGRAM_WEBHOOK_SECRET:?set RIDER_TELEGRAM_WEBHOOK_SECRET}
      RIDER_TELEGRAM_BOT_TOKEN: ${RIDER_TELEGRAM_BOT_TOKEN:?set RIDER_TELEGRAM_BOT_TOKEN}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  scheduler:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    image: rider-server:dev
    command: python -m rider_server.scheduler
    env_file:
      - ./env/backend-api.env
    environment:
      DATABASE_URL: "postgresql+asyncpg://${RIDER_POSTGRES_USER:-rider}:${RIDER_POSTGRES_PASSWORD:?set RIDER_POSTGRES_PASSWORD}@db:5432/${RIDER_POSTGRES_DB:-rider}"
      RIDER_DB_POOL_SIZE: ${RIDER_DB_POOL_SIZE:-5}
      RIDER_DB_MAX_OVERFLOW: ${RIDER_DB_MAX_OVERFLOW:-10}
      SCHEDULER_INTERVAL_SECONDS: ${SCHEDULER_INTERVAL_SECONDS:-30}
      SCHEDULER_DUE_BATCH_SIZE: ${SCHEDULER_DUE_BATCH_SIZE:-100}
      SCHEDULER_HEALTH_FILE: /tmp/rider_scheduler_last_tick
      SCHEDULER_HEALTH_MAX_AGE_SECONDS: ${SCHEDULER_HEALTH_MAX_AGE_SECONDS:-120}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,pathlib,time; p=pathlib.Path(os.environ.get('SCHEDULER_HEALTH_FILE','/tmp/rider_scheduler_last_tick')); max_age=float(os.environ.get('SCHEDULER_HEALTH_MAX_AGE_SECONDS','120')); assert p.exists() and time.time() - p.stat().st_mtime <= max_age\""]
      interval: 30s
      timeout: 5s
      retries: 4
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      backend-api:
        condition: service_started

  queue-recovery:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    image: rider-server:dev
    command: python -m rider_server.queue
    env_file:
      - ./env/backend-api.env
    environment:
      DATABASE_URL: "postgresql+asyncpg://${RIDER_POSTGRES_USER:-rider}:${RIDER_POSTGRES_PASSWORD:?set RIDER_POSTGRES_PASSWORD}@db:5432/${RIDER_POSTGRES_DB:-rider}"
      RIDER_DB_POOL_SIZE: ${RIDER_DB_POOL_SIZE:-5}
      RIDER_DB_MAX_OVERFLOW: ${RIDER_DB_MAX_OVERFLOW:-10}
      QUEUE_RECOVERY_INTERVAL_SECONDS: ${QUEUE_RECOVERY_INTERVAL_SECONDS:-30}
      RIDER_JOB_RECOVERY_BATCH_SIZE: ${RIDER_JOB_RECOVERY_BATCH_SIZE:-100}
      QUEUE_RECOVERY_HEALTH_FILE: /tmp/rider_queue_recovery_last_tick
      QUEUE_RECOVERY_HEALTH_MAX_AGE_SECONDS: ${QUEUE_RECOVERY_HEALTH_MAX_AGE_SECONDS:-120}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,pathlib,time; p=pathlib.Path(os.environ.get('QUEUE_RECOVERY_HEALTH_FILE','/tmp/rider_queue_recovery_last_tick')); max_age=float(os.environ.get('QUEUE_RECOVERY_HEALTH_MAX_AGE_SECONDS','120')); assert p.exists() and time.time() - p.stat().st_mtime <= max_age\""]
      interval: 30s
      timeout: 5s
      retries: 4
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      backend-api:
        condition: service_started

  telegram-dispatch:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    image: rider-server:dev
    command: python -m rider_server.dispatch
    env_file:
      - ./env/backend-api.env
      - ./env/telegram-webhook.env
    environment:
      DATABASE_URL: "postgresql+asyncpg://${RIDER_POSTGRES_USER:-rider}:${RIDER_POSTGRES_PASSWORD:?set RIDER_POSTGRES_PASSWORD}@db:5432/${RIDER_POSTGRES_DB:-rider}"
      RIDER_DB_POOL_SIZE: ${RIDER_DB_POOL_SIZE:-5}
      RIDER_DB_MAX_OVERFLOW: ${RIDER_DB_MAX_OVERFLOW:-10}
      TELEGRAM_DISPATCH_INTERVAL_SECONDS: ${TELEGRAM_DISPATCH_INTERVAL_SECONDS:-5}
      TELEGRAM_DISPATCH_BATCH_SIZE: ${TELEGRAM_DISPATCH_BATCH_SIZE:-50}
      TELEGRAM_DISPATCH_MAX_ATTEMPTS: ${TELEGRAM_DISPATCH_MAX_ATTEMPTS:-3}
      TELEGRAM_DISPATCH_LOCK_TIMEOUT_SECONDS: ${TELEGRAM_DISPATCH_LOCK_TIMEOUT_SECONDS:-300}
      TELEGRAM_DISPATCH_HEALTH_FILE: /tmp/rider_telegram_dispatch_last_tick
      TELEGRAM_DISPATCH_HEALTH_MAX_AGE_SECONDS: ${TELEGRAM_DISPATCH_HEALTH_MAX_AGE_SECONDS:-120}
      RIDER_TELEGRAM_BOT_TOKEN: ${RIDER_TELEGRAM_BOT_TOKEN:?set RIDER_TELEGRAM_BOT_TOKEN}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,pathlib,time; p=pathlib.Path(os.environ.get('TELEGRAM_DISPATCH_HEALTH_FILE','/tmp/rider_telegram_dispatch_last_tick')); max_age=float(os.environ.get('TELEGRAM_DISPATCH_HEALTH_MAX_AGE_SECONDS','120')); assert p.exists() and time.time() - p.stat().st_mtime <= max_age\""]
      interval: 30s
      timeout: 5s
      retries: 4
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      backend-api:
        condition: service_started

  # 후속 스토리 placeholder (범위 아님):
  # admin-ui:             # Story 5.6 — Admin UI

volumes:
  postgres-data:
